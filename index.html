<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Task Manager</title>
<style>
  :root {
    --paper: #faf8f3;
    --ink: #2b2b26;
    --line: #ddd7c9;
    --accent: #3f6f52;
    --accent-soft: #e8f0ea;
    --muted: #8a8472;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  main {
    width: 100%;
    max-width: 480px;
  }

  .eyebrow {
    font-family: "Courier New", monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 4px;
  }

  h1 {
    font-size: 28px;
    margin: 0 0 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  form {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    color: var(--ink);
  }

  input[type="text"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  button {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
  }

  form button {
    padding: 12px 18px;
    background: var(--ink);
    color: var(--paper);
  }

  form button:hover { opacity: 0.85; }

  ul#task-list {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--line);
  }

  li.task {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 2px;
    border-bottom: 1px solid var(--line);
  }

  li.task .text {
    font-size: 15px;
    word-break: break-word;
  }

  li.task button.complete {
    flex-shrink: 0;
    padding: 7px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 13px;
  }

  li.task button.complete:hover {
    background: var(--accent);
    color: #fff;
  }

  .empty-state {
    padding: 32px 2px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow" id="today"></p>
  <h1>Daily Tasks</h1>

  <form id="task-form">
    <input type="text" id="task-input" placeholder="e.g. Buy groceries" autocomplete="off" required />
    <button type="submit">Add</button>
  </form>

  <ul id="task-list"></ul>
</main>

<script>
  const form = document.getElementById("task-form");
  const input = document.getElementById("task-input");
  const list = document.getElementById("task-list");

  document.getElementById("today").textContent = new Date().toLocaleDateString(undefined, {
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  });

  function renderTasks(tasks) {
    list.innerHTML = "";

    if (tasks.length === 0) {
      list.innerHTML = '<li class="empty-state">No tasks yet. Add one above to get started.</li>';
      return;
    }

    tasks.forEach((task) => {
      const li = document.createElement("li");
      li.className = "task";

      const span = document.createElement("span");
      span.className = "text";
      span.textContent = task.task_text;

      const btn = document.createElement("button");
      btn.className = "complete";
      btn.textContent = "✔ Complete";
      btn.addEventListener("click", () => completeTask(task.id));

      li.appendChild(span);
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  async function loadTasks() {
    try {
      const res = await fetch("/api/tasks");
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (err) {
      console.error("Failed to load tasks", err);
    }
  }

  async function addTask(text) {
    try {
      await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_text: text }),
      });
      await loadTasks();
    } catch (err) {
      console.error("Failed to add task", err);
    }
  }

  async function completeTask(id) {
    try {
      await fetch(`/api/tasks/${id}`, { method: "DELETE" });
      await loadTasks();
    } catch (err) {
      console.error("Failed to complete task", err);
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const value = input.value.trim();
    if (!value) return;
    addTask(value);
    input.value = "";
    input.focus();
  });

  loadTasks();
</script>
</body>
</html>
